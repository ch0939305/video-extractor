<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>文案提取大師 · Video Caption Extractor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--bg-primary: #FDF8F3; --bg-card: #FFFFFF; --bg-card-hover: #FFF9F0;
--text-primary: #2D2520; --text-secondary: #6B5D4F; --text-muted: #A89B8C;
--accent: #D2691E; --accent-light: #F4A460;
--accent-bg: rgba(210, 105, 30, 0.08); --accent-bg-hover: rgba(210, 105, 30, 0.15);
--border: rgba(210, 105, 30, 0.15); --shadow: 0 4px 20px rgba(45, 37, 32, 0.08);
--shadow-hover: 0 12px 40px rgba(210, 105, 30, 0.18);
--header-bg: rgba(253, 248, 243, 0.9);
}
[data-theme="dark"] {
--bg-primary: #0A0E14; --bg-card: #1A2030; --bg-card-hover: #232B3D;
--text-primary: #E8EAED; --text-secondary: #9CA3AF; --text-muted: #6B7280;
--accent: #00D9A3; --accent-light: #00F5BB;
--accent-bg: rgba(0, 217, 163, 0.1); --accent-bg-hover: rgba(0, 217, 163, 0.2);
--border: rgba(0, 217, 163, 0.2); --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
--shadow-hover: 0 12px 40px rgba(0, 217, 163, 0.25);
--header-bg: rgba(10, 14, 20, 0.9);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
font-family: 'Noto Sans TC', sans-serif;
background: var(--bg-primary); color: var(--text-primary);
min-height: 100vh; transition: background 0.5s, color 0.5s; line-height: 1.6;
}
.bg-blob { position: fixed; border-radius: 50%; filter: blur(120px); z-index: 0; pointer-events: none; animation: float 20s infinite ease-in-out; }
.bg-blob:nth-child(1) { width: 400px; height: 400px; background: var(--accent); top: -100px; right: -100px; opacity: 0.15; }
.bg-blob:nth-child(2) { width: 300px; height: 300px; background: var(--accent-light); bottom: -50px; left: -50px; opacity: 0.12; animation-delay: -10s; }
@keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,40px)} }
.container { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 0 16px 60px; }
/* Header */
.header { position: sticky; top: 0; z-index: 100; background: var(--header-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
.header-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; max-width: 800px; margin: 0 auto; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 38px; height: 38px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; flex-shrink: 0; }
.logo-text h1 { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; color: var(--text-primary); }
.logo-text p { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
.theme-toggle { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.3s; flex-shrink: 0; }
/* Hero */
.hero { text-align: center; padding: 32px 0 24px; }
.hero h2 { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
.hero h2 span { color: var(--accent); }
.hero p { color: var(--text-secondary); font-size: 14px; }
/* Card */
.extractor-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
.extractor-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--accent), var(--accent-light)); }
.input-wrapper { position: relative; margin-bottom: 14px; }
.url-input {
width: 100%; padding: 14px 110px 14px 14px; font-size: 15px;
font-family: 'Noto Sans TC', sans-serif; background: var(--bg-primary);
border: 2px solid var(--border); border-radius: 12px; color: var(--text-primary);
transition: all 0.3s;
}
.url-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-bg); }
.paste-btn {
position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
padding: 8px 14px; background: var(--accent-bg); color: var(--accent);
border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px;
}
.paste-btn:hover { background: var(--accent); color: white; }
.extract-btn {
width: 100%; padding: 15px; background: var(--accent); color: white;
border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
font-family: 'Noto Sans TC', sans-serif; cursor: pointer; transition: all 0.3s;
display: flex; align-items: center; justify-content: center; gap: 8px;
box-shadow: 0 4px 15px var(--accent-bg-hover);
}
.extract-btn:hover { background: var(--accent-light); transform: translateY(-2px); }
.extract-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.status-tip { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; }
/* Loading */
.loading-overlay { display: none; text-align: center; padding: 40px 0; }
.loading-overlay.visible { display: block; }
.loader { width: 44px; height: 44px; border: 4px solid var(--accent-bg); border-top-color: var(--accent); border-radius: 50%; margin: 0 auto 14px; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text-secondary); font-size: 14px; }
/* Result */
.result-area { margin-top: 28px; display: none; animation: slideUp 0.4s ease; }
.result-area.visible { display: block; }
@keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.result-title { font-size: 15px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
.result-platform { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--accent-bg); color: var(--accent); font-weight: 500; }
.result-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.action-btn {
padding: 7px 12px; background: var(--bg-card); border: 1px solid var(--border);
border-radius: 8px; color: var(--text-secondary); font-size: 12px; font-weight: 500;
cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 5px;
font-family: 'Noto Sans TC', sans-serif;
}
.action-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
.text-output {
width: 100%; min-height: 200px; padding: 16px;
background: var(--bg-primary); border: 1px solid var(--border); border-radius: 12px;
color: var(--text-primary); font-family: 'Noto Sans TC', sans-serif;
font-size: 15px; line-height: 1.8; resize: vertical; outline: none; transition: all 0.3s;
}
.text-output:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-bg); }
/* History */
.history-section { margin-top: 36px; }
.history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.history-title { font-size: 15px; font-weight: 600; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
.clear-btn { font-size: 12px; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.2s; }
.clear-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
.history-list { display: grid; gap: 10px; }
.history-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; transition: all 0.2s; cursor: pointer; }
.history-item:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
.history-item-header { display: flex; justify-content: space-between; margin-bottom: 4px; align-items: center; gap: 8px; }
.history-url { font-size: 11px; color: var(--accent); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%; }
.history-time { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
.history-text { font-size: 13px; color: var(--text-secondary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.empty-state { text-align: center; padding: 28px; color: var(--text-muted); font-size: 13px; border: 1px dashed var(--border); border-radius: 12px; }
/* Toast */
.toast {
position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
padding: 10px 20px; display: flex; align-items: center; gap: 8px;
font-size: 13px; font-weight: 500; color: var(--text-primary);
box-shadow: var(--shadow-hover); z-index: 200;
transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); pointer-events: none; max-width: 90%;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast i { color: var(--accent); font-size: 14px; }
/* Mobile */
@media (max-width: 600px) {
.container { padding: 0 10px 40px; }
.hero { padding: 20px 0 18px; }
.hero h2 { font-size: 20px; }
.hero p { font-size: 13px; }
.extractor-card { padding: 16px; border-radius: 16px; }
.url-input { padding-right: 58px; font-size: 14px; }
.paste-btn { padding: 6px 10px; font-size: 12px; }
.paste-btn .btn-text { display: none; }
.extract-btn { padding: 13px; font-size: 14px; }
.result-header { flex-direction: column; align-items: flex-start; }
.result-actions { width: 100%; display: grid; grid-template-columns: 1fr 1fr 1fr; }
.action-btn { justify-content: center; font-size: 11px; padding: 8px 6px; }
.text-output { min-height: 150px; font-size: 14px; padding: 12px; }
}
</style>
</head>
<body>
<div class="bg-blob"></div>
<div class="bg-blob"></div>
<header class="header">
<div class="header-inner">
<div class="logo">
<div class="logo-icon"><i class="fas fa-closed-captioning"></i></div>
<div class="logo-text">
<h1>文案提取大師</h1>
<p>Video Caption Extractor · 真實 API 版</p>
</div>
</div>
<button class="theme-toggle" id="themeToggle" aria-label="切換主題">
<i class="fas fa-moon"></i>
</button>
</div>
</header>
<main class="container">
<div class="hero">
<h2>一鍵提取短視頻 <span>文案</span></h2>
<p>支援抖音 / TikTok / B站 / 小紅書</p>
</div>
<div class="extractor-card">
<div class="input-wrapper">
<input type="text" class="url-input" id="urlInput" placeholder="貼上分享連結，如 https://v.douyin.com/xxx">
<button class="paste-btn" id="pasteBtn">
<i class="fas fa-clipboard"></i> <span class="btn-text">貼上</span>
</button>
</div>
<button class="extract-btn" id="extractBtn">
<i class="fas fa-magic"></i> 開始提取文案
</button>
<div class="status-tip">
<i class="fas fa-shield-halved"></i> 僅提取文字描述，不儲存影片檔案
</div>
</div>
<div class="loading-overlay" id="loadingOverlay">
<div class="loader"></div>
<p class="loading-text" id="loadingText">正在解析影片資訊...</p>
</div>
<div class="result-area" id="resultArea">
<div class="result-header">
<div class="result-title">
<i class="fas fa-file-lines" style="color:var(--accent)"></i>
<span>提取結果</span>
<span class="result-platform" id="platformBadge"></span>
</div>
<div class="result-actions">
<button class="action-btn" id="copyBtn"><i class="fas fa-copy"></i> <span>複製</span></button>
<button class="action-btn" id="downloadBtn"><i class="fas fa-download"></i> <span>下載</span></button>
<button class="action-btn" id="saveBtn"><i class="fas fa-bookmark"></i> <span>保存</span></button>
</div>
</div>
<textarea class="text-output" id="textOutput" placeholder="文案內容將顯示在這裡..." readonly></textarea>
</div>
<div class="history-section" id="historySection">
<div class="history-header">
<div class="history-title"><i class="fas fa-clock-rotate-left"></i> 歷史記錄</div>
<button class="clear-btn" id="clearHistoryBtn">清空</button>
</div>
<div class="history-list" id="historyList">
<div class="empty-state">暫無保存記錄</div>
</div>
</div>
</main>
<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg">完成</span></div>

<script>
// ===== 設定（部署後改這裡） =====
// 方式 A：使用 Vercel 後端 API
const API_BASE = 'https://video-extractor-five.vercel.app/api/extract';
// 方式 B：直接使用免費 API（無需後端，但較不穩定）
const FALLBACK_API = 'https://api.douyin.wtf/api';

// ===== 狀態 =====
let extractHistory = JSON.parse(localStorage.getItem('video-extract-history') || '[]');
let lastResult = '';

// ===== 主題 =====
const savedTheme = localStorage.getItem('extractor-theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('themeToggle').innerHTML = savedTheme === 'dark'
  ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
document.getElementById('themeToggle').addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('extractor-theme', next);
  document.getElementById('themeToggle').innerHTML = next === 'dark'
    ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
});

// ===== Toast =====
function showToast(msg, type) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  const icon = t.querySelector('i');
  icon.className = type === 'error' ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
  icon.style.color = type === 'error' ? '#ef4444' : 'var(--accent)';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== 貼上 =====
document.getElementById('pasteBtn').addEventListener('click', async () => {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('urlInput').value = text;
    showToast('已貼上連結');
  } catch {
    document.getElementById('urlInput').focus();
    document.execCommand('paste');
  }
});

// ===== 🔥 真實 API 提取 =====
document.getElementById('extractBtn').addEventListener('click', doExtract);

async function doExtract() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { showToast('請先輸入影片連結', 'error'); return; }

  const btn = document.getElementById('extractBtn');
  const loading = document.getElementById('loadingOverlay');
  const result = document.getElementById('resultArea');
  const loadText = document.getElementById('loadingText');

  btn.disabled = true;
  loading.classList.add('visible');
  result.classList.remove('visible');
  loadText.textContent = '正在解析影片資訊...';

  let caption = null;
  let platform = '';

  try {
    // 嘗試 Vercel 後端 API
    const resp = await fetch(API_BASE + '?url=' + encodeURIComponent(url), {
      signal: AbortSignal.timeout(12000)
    });
    const data = await resp.json();
    if (data.success && data.caption) {
      caption = data.caption;
      platform = data.platform || '';
    }
  } catch (e) {
    // Vercel 後端不可用 → 嘗試免費 API
    loadText.textContent = '後端 API 無法連線，嘗試免費服務...';
    try {
      // 方式 1: douyin.wtf API
      const r1 = await fetch('https://douyin.wtf/api?url=' + encodeURIComponent(url), {
        signal: AbortSignal.timeout(5000)
      });
      const d1 = await r1.json();
      if (d1?.desc) { caption = d1.desc; platform = '抖音'; }
      else if (d1?.data?.desc) { caption = d1.data.desc; }
    } catch(e2) {
      // 方式 2: 嘗試 tikwm
      try {
        const r2 = await fetch('https://www.tikwm.com/api/?url=' + encodeURIComponent(url), {
          signal: AbortSignal.timeout(5000)
        });
        const d2 = await r2.json();
        if (d2.code === 0) {
          caption = d2.data?.title || d2.data?.desc || '';
          platform = 'TikTok/抖音';
        }
      } catch(e3) {}
    }
  }

  btn.disabled = false;
  loading.classList.remove('visible');

  if (caption) {
    lastResult = caption;
    document.getElementById('textOutput').value = caption;
    document.getElementById('platformBadge').textContent = platform ? '📺 ' + platform : '';
    result.classList.add('visible');
    setTimeout(() => result.scrollIntoView({ behavior: 'smooth', block: 'start' }), 200);
    showToast('提取成功 ✓');
  } else {
    showToast('無法提取文案，請確認連結是否正確', 'error');
  }
}

// ===== 複製 =====
document.getElementById('copyBtn').addEventListener('click', () => {
  if (!lastResult) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(lastResult).then(() => showToast('已複製'));
  } else {
    const ta = document.getElementById('textOutput');
    ta.select(); document.execCommand('copy'); showToast('已複製');
  }
});

// ===== 下載 TXT =====
document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!lastResult) return;
  const blob = new Blob([lastResult], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '文案_' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '.txt';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(a.href);
  showToast('已下載 TXT');
});

// ===== 保存歷史 =====
document.getElementById('saveBtn').addEventListener('click', () => {
  if (!lastResult) { showToast('沒有內容可保存', 'error'); return; }
  const url = document.getElementById('urlInput').value.trim();
  extractHistory.unshift({
    id: Date.now(),
    url: url,
    text: lastResult.substring(0, 200),
    time: new Date().toLocaleString('zh-TW')
  });
  if (extractHistory.length > 20) extractHistory.pop();
  localStorage.setItem('video-extract-history', JSON.stringify(extractHistory));
  renderHistory();
  showToast('已保存 ✓');
});

// ===== 歷史 =====
function renderHistory() {
  const list = document.getElementById('historyList');
  if (!extractHistory.length) { list.innerHTML = '<div class="empty-state">暫無保存記錄</div>'; return; }
  list.innerHTML = extractHistory.map(h =>
    '<div class="history-item" onclick="loadHistory('+h.id+')">' +
    '<div class="history-item-header">' +
    '<span class="history-url"><i class="fas fa-link"></i> ' + (h.url || '未知') + '</span>' +
    '<span class="history-time">' + h.time + '</span></div>' +
    '<div class="history-text">' + h.text.replace(/\n/g, ' ') + '</div></div>'
  ).join('');
}
function loadHistory(id) {
  const h = extractHistory.find(r => r.id === id);
  if (!h) return;
  document.getElementById('urlInput').value = h.url;
  // 重新提取
  doExtract();
}
document.getElementById('clearHistoryBtn').addEventListener('click', () => {
  if (!extractHistory.length) return;
  extractHistory = [];
  localStorage.removeItem('video-extract-history');
  renderHistory();
  showToast('已清空');
});

// ===== 初始化 =====
renderHistory();
</script>
</body>
</html>
